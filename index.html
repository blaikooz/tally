<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0F0E">
<title>tally</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg: #0B0F0E;
    --backdrop: #060807;
    --cream: #E6EBE8;
    --cream-dim: rgba(230,235,232,0.52);
    --dash: rgba(230,235,232,0.14);
    --dash-faint: rgba(230,235,232,0.08);
    --blue: #4FD1D9;
    --blue-dim: rgba(79,209,217,0.14);
    --red: #F0685F;
    --yellow: #F5C144;
    --green: #4FCE7E;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; margin:0; }
  body{
    background: var(--backdrop);
    background-image: radial-gradient(ellipse at 50% 0%, rgba(166,203,216,0.06), transparent 60%);
    font-family:'Inter',sans-serif; color:var(--cream);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding: 30px 16px;
  }
  button, input, select, textarea{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--blue); outline-offset:2px; }

  .phone-frame{
    width: 402px; height: 844px;
    background: var(--bg);
    border-radius: 46px;
    border: 10px solid #05070A;
    box-shadow: 0 30px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .screen{
    position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom: 108px; padding-top: 34px;
    background-image:
      linear-gradient(rgba(230,235,232,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(230,235,232,0.025) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .screen::-webkit-scrollbar{ display:none; }

  .brand{ padding: 10px 22px 6px; text-align:center; }
  .brand h1{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:34px; margin:0; letter-spacing:0.5px; }
  .brand h1 .cursor{ display:inline-block; width:9px; height:28px; background:var(--blue); margin-left:4px; vertical-align:-4px; animation:blink 1.1s step-end infinite; }
  @keyframes blink{ 50%{ opacity:0; } }
  .underline{ width:56px; height:2px; background:var(--blue); opacity:0.55; margin: 10px auto 0; border:none; }

  .label-caps{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1.4px; color:var(--cream-dim); text-transform:uppercase; font-weight:600; padding: 0 22px; margin-bottom:9px; }

  /* ---- Search / sort ---- */
  .list-controls{ display:flex; gap:8px; padding: 10px 22px 8px; }
  .list-controls input[type="search"]{
    flex:1; min-width:0; background:transparent; border:1px solid var(--dash); border-radius:7px;
    padding:9px 11px; color:var(--cream); font-family:'Inter',sans-serif; font-size:13.5px; outline:none;
  }
  .list-controls input[type="search"]::placeholder{ color:var(--cream-dim); }
  .list-controls input[type="search"]:focus{ border-color:var(--blue); }
  .list-controls select{
    background:transparent; border:1px solid var(--dash); border-radius:7px;
    padding:9px 8px; color:var(--cream-dim); font-family:'Inter',sans-serif; font-size:12.5px; outline:none;
  }
  .list-controls select:focus{ border-color:var(--blue); }

  .list-wrap{ padding: 6px 22px 10px; }
  .empty{ text-align:center; color:var(--cream-dim); font-size:16px; padding:56px 10px; }
  .section-header{ font-family:'JetBrains Mono',monospace; font-size:18px; color:var(--cream-dim); margin:14px 0 7px 2px; display:flex; align-items:center; gap:8px; }
  .section-header .line{ flex:1; height:1px; background:var(--dash-faint); }

  .card{ background: rgba(237,234,224,0.03); border:1px solid var(--dash-faint); border-radius:8px; padding:11px 13px; margin-bottom:8px; }
  .card-top{ display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .dot{ width:9px; height:9px; border-radius:2.5px; flex-shrink:0; }
  .dot.red{ background:var(--red); box-shadow:0 0 5px rgba(240,104,95,.7); }
  .dot.yellow{ background:var(--yellow); box-shadow:0 0 5px rgba(245,193,68,.7); }
  .dot.green{ background:var(--green); box-shadow:0 0 5px rgba(79,206,126,.7); }
  .card-text{ font-size:15px; font-weight:500; word-break:break-word; flex:1; min-width:0; cursor:text; border-radius:4px; padding:1px 3px; margin:-1px -3px; }
  .card-text:hover{ background:rgba(237,234,224,0.05); }
  .card-text-edit{
    flex:1; min-width:0; background:rgba(237,234,224,0.05); border:1px solid var(--blue); border-radius:4px;
    padding:1px 3px; margin:-1px -3px; color:var(--cream); font-family:'Inter',sans-serif; font-size:15px; font-weight:500; outline:none;
  }
  .del-btn{ background:none; border:none; color:var(--cream-dim); cursor:pointer; font-size:16px; flex-shrink:0; }
  .del-btn:hover{ color:var(--red); }

  .card-sub{ font-size:12px; color:var(--cream-dim); margin: -1px 0 6px 17px; }

  .card-group-row{ margin: 0 0 6px 17px; }
  .card-group-row select{
    background:transparent; border:1px solid var(--dash-faint); border-radius:6px;
    padding:4px 8px; color:var(--cream-dim); font-family:'Inter',sans-serif; font-size:11.5px; outline:none;
  }
  .card-group-row select:focus{ border-color:var(--blue); }

  .card-controls-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-left:17px; }

  .res-btns{ display:flex; gap:5px; }
  .res-btn{ width:23px; height:23px; border-radius:50%; border:1px solid var(--dash); background:transparent; color:var(--cream-dim); font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .res-btn.won.active{ background:rgba(143,192,138,.2); border-color:var(--green); color:var(--green); border-style:solid; }
  .res-btn.lost.active{ background:rgba(208,128,118,.2); border-color:var(--red); color:var(--red); border-style:solid; }

  .tally-area{ display:flex; align-items:center; gap:2.5px; flex-wrap:wrap; min-height:16px; }
  .seg{ width:6px; height:15px; border-radius:2px; background:var(--dash-faint); border:1px solid var(--dash); flex-shrink:0; }
  .seg.filled{ opacity:0.9; }
  .seg.filled.red{ background:var(--red); border-color:var(--red); }
  .seg.filled.yellow{ background:var(--yellow); border-color:var(--yellow); }
  .seg.filled.green{ background:var(--green); border-color:var(--green); }
  .seg.filled.new{ animation:segIn .22s ease-out; }
  @keyframes segIn{ from{ transform:scaleY(0.3); opacity:0.2; } to{ transform:scaleY(1); opacity:0.85; } }

  .right-controls{ display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .count-num{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:20px; color:var(--blue); min-width:20px; text-align:center; }
  .target-edit{ width:28px; background:transparent; border:none; border-bottom:1px solid var(--dash); color:var(--cream-dim); font-family:'Inter',sans-serif; font-size:12px; text-align:center; outline:none; }
  .target-edit:focus{ border-color:var(--blue); color:var(--cream); }
  .of-target{ color:var(--cream-dim); font-size:12px; }

  .stepper{ display:flex; gap:5px; }
  .stepper button{ width:23px; height:23px; border-radius:50%; border:1px solid var(--dash); background:transparent; color:var(--cream); font-size:13px; cursor:pointer; }
  .stepper button:hover{ border-color:var(--blue); }
  .stepper button:disabled{ opacity:.3; cursor:default; }

  .yn-btns{ display:flex; gap:8px; }
  .yn-btn{ border:1px solid var(--dash); background:transparent; color:var(--cream-dim); border-radius:6px; padding:6px 13px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .yn-btn.yes.active{ background:rgba(143,192,138,.18); border-color:var(--green); color:var(--green); }
  .yn-btn.no.active{ background:rgba(208,128,118,.18); border-color:var(--red); color:var(--red); }

  /* ---- Toast ---- */
  .toast{
    position:absolute; left:22px; right:22px; bottom:96px;
    background:#1A2320; border:1px solid var(--dash); border-radius:10px;
    padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:12px;
    transform:translateY(12px); opacity:0; pointer-events:none; transition: all .18s ease;
    z-index:40; box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show{ transform:translateY(0); opacity:1; pointer-events:auto; }
  .toast span{ font-size:13.5px; color:var(--cream-dim); }
  .toast button{ background:none; border:none; color:var(--blue); font-weight:700; font-size:13.5px; cursor:pointer; letter-spacing:0.3px; text-transform:uppercase; flex-shrink:0; }

  /* ---- Bottom bar ---- */
  .bottom-bar{ position:absolute; left:0; right:0; bottom:0; background: linear-gradient(180deg, rgba(23,35,29,0) 0%, var(--bg) 30%); padding: 26px 22px 22px; display:flex; align-items:center; gap:10px; }
  .groups-btn{ flex:1; background:transparent; color:var(--cream); border:1px solid var(--dash); border-radius:8px; padding:16px 10px; font-weight:700; font-size:13px; letter-spacing:0.8px; text-transform:uppercase; cursor:pointer; font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px; }
  .groups-btn:hover{ border-color:var(--blue); }
  .groups-btn .bars{ color:var(--blue); font-size:16px; }
  .fab{ width:56px; height:56px; border-radius:50%; background:var(--blue); color:var(--bg); border:none; font-size:26px; font-weight:700; cursor:pointer; flex-shrink:0; box-shadow: 0 6px 16px rgba(0,0,0,0.35); display:flex; align-items:center; justify-content:center; }

  /* ---- Add sheet ---- */
  .sheet-overlay{ position:absolute; inset:0; background:rgba(0,0,0,0.5); opacity:0; pointer-events:none; transition:opacity .2s ease; z-index:20; }
  .sheet-overlay.open{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; background:var(--bg); border-top:1px solid var(--dash-faint); border-radius:16px 16px 0 0; padding: 18px 22px 28px; transform: translateY(100%); transition: transform .25s ease; max-height: 85%; overflow-y:auto; z-index: 21; }
  .sheet.open{ transform: translateY(0); }
  .sheet-handle{ width:36px; height:4px; background:var(--dash); border-radius:4px; margin: 0 auto 16px; }
  .sheet-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .sheet-head h3{ font-family:'JetBrains Mono',monospace; font-size:28px; margin:0; }
  .sheet-close{ background:none; border:none; color:var(--cream-dim); font-size:19px; cursor:pointer; }

  .field{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
  .field-row{ display:flex; gap:10px; align-items:flex-start; }
  .field-row .field{ margin-bottom:18px; }
  .field-row .grow{ flex:1; min-width:0; }
  .field-row .group-field{ width:118px; flex-shrink:0; }
  .field-row .group-field select{ padding:14px 8px; font-size:14px; }

  .field input[type="text"], .field select{ background:transparent; border:1px solid var(--dash); border-radius:7px; padding:14px 15px; color:var(--cream); font-family:'Inter',sans-serif; font-size:17px; outline:none; width:100%; }
  .field input::placeholder{ color:var(--cream-dim); }
  .field input:focus, .field select:focus{ border-color:var(--blue); }

  .type-toggle{ display:flex; gap:8px; }
  .type-btn{ flex:1; background:transparent; border:1px solid var(--dash); color:var(--cream-dim); border-radius:7px; padding:12px 6px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .type-btn.active{ background:var(--blue); color:var(--bg); border-color:var(--blue); }

  .stepper-field{ display:flex; align-items:center; justify-content:space-between; gap:10px; border:1px solid var(--dash); border-radius:7px; padding:10px 16px; }
  .stepper-field button{ width:32px; height:32px; border-radius:50%; border:1px solid var(--dash); background:transparent; color:var(--cream); font-size:17px; cursor:pointer; }
  .stepper-field span{ font-size:17px; }

  .sheet-submit{ width:100%; background:var(--blue); color:var(--bg); border:none; border-radius:8px; padding:16px; font-weight:700; font-size:14px; letter-spacing:0.8px; text-transform:uppercase; cursor:pointer; margin-top:4px; font-family:'Inter',sans-serif; }

  /* ---- Drawer ---- */
  .drawer-overlay{ position:absolute; inset:0; background:rgba(0,0,0,0.5); opacity:0; pointer-events:none; transition:opacity .2s ease; z-index:24; }
  .drawer-overlay.open{ opacity:1; pointer-events:auto; }
  .drawer{ position:absolute; top:0; bottom:0; left:0; width:78%; max-width:300px; background:var(--bg); border-right:1px solid var(--dash-faint); transform:translateX(-100%); transition:transform .25s ease; z-index:25; padding: 22px 0 22px; overflow-y:auto; }
  .drawer.open{ transform:translateX(0); }
  .drawer-head{ display:flex; justify-content:space-between; align-items:center; padding:0 20px 16px; }
  .drawer-head h3{ font-family:'JetBrains Mono',monospace; font-size:26px; margin:0; }
  .drawer-close{ background:none; border:none; color:var(--cream-dim); font-size:18px; cursor:pointer; }

  .view-rows{ display:flex; flex-direction:column; gap:8px; padding: 0 20px; margin-bottom:22px; }
  .view-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 15px; border-radius:6px; cursor:pointer; border:1px solid var(--dash-faint); color:var(--cream-dim); }
  .view-row .name{ font-family:'JetBrains Mono',monospace; font-size:21px; }
  .view-row.active{ border-color:var(--blue); background:var(--blue-dim); color:var(--cream); }
  .view-row .n{ font-size:13px; }

  .group-cards{ display:flex; flex-direction:column; gap:10px; padding:0 20px; margin-bottom:10px; }
  .group-card{ border:1px solid var(--dash-faint); border-radius:8px; padding:12px 14px; cursor:pointer; display:flex; align-items:center; gap:12px; }
  .group-card.active{ border-color:var(--blue); background:var(--blue-dim); }
  .group-card .ginfo{ flex:1; min-width:0; }
  .group-card .gname-row{ display:flex; align-items:center; gap:6px; }
  .group-card .gname{ font-family:'JetBrains Mono',monospace; font-size:20px; color:var(--cream); }
  .group-card .gname-edit{ font-family:'JetBrains Mono',monospace; font-size:16px; color:var(--cream); background:rgba(237,234,224,0.05); border:1px solid var(--blue); border-radius:4px; padding:1px 4px; width:100%; outline:none; }
  .group-card .gedit-btn{ background:none; border:none; color:var(--cream-dim); font-size:11px; cursor:pointer; flex-shrink:0; }
  .group-card .gedit-btn:hover{ color:var(--blue); }
  .group-card .gpicks{ font-size:12px; color:var(--cream-dim); margin-top:2px; }
  .group-card .gwinrate{ font-size:11.5px; color:var(--cream-dim); margin-top:1px; }
  .group-card .gdel{ color:var(--cream-dim); font-size:13px; flex-shrink:0; }
  .group-card .gdel:hover{ color:var(--red); }

  .new-group-btn{ margin: 0 20px; border: 1px solid var(--dash); background:transparent; color:var(--cream-dim); border-radius:7px; padding:12px 14px; font-size:14px; text-align:left; cursor:pointer; font-family:'Inter',sans-serif; width:calc(100% - 40px); }
  .new-group-btn:hover{ border-color:var(--blue); color:var(--cream); }
  .group-add-inline{ display:flex; gap:8px; margin:0 20px; }
  .group-add-inline input{ flex:1; background:transparent; border:1px solid var(--dash); border-radius:6px; padding:11px 14px; color:var(--cream); font-family:'Inter',sans-serif; font-size:15px; outline:none; }
  .group-add-inline input:focus{ border-color:var(--blue); }
  .group-add-inline button{ background:var(--blue); color:var(--bg); border:none; border-radius:6px; padding:0 16px; font-weight:700; font-size:14.5px; cursor:pointer; }

  .drawer-footer{ padding: 14px 20px 0; border-top:1px solid var(--dash-faint); margin-top:12px; }
  .drawer-footer-btn{
    width:100%; background:transparent; border:1px solid var(--dash); color:var(--cream-dim);
    border-radius:7px; padding:11px 12px; font-size:13.5px; font-weight:600; cursor:pointer;
    font-family:'Inter',sans-serif; text-align:left;
  }
  .drawer-footer-btn:hover{ border-color:var(--blue); color:var(--cream); }

  /* ---- Data modal ---- */
  .data-modal-overlay{ position:absolute; inset:0; background:rgba(0,0,0,0.55); opacity:0; pointer-events:none; transition:opacity .2s ease; z-index:30; }
  .data-modal-overlay.open{ opacity:1; pointer-events:auto; }
  .data-modal{
    position:absolute; left:22px; right:22px; top:50%; transform:translateY(-50%) scale(0.96); opacity:0; pointer-events:none;
    background:var(--bg); border:1px solid var(--dash); border-radius:14px; padding:20px; transition: all .18s ease; z-index:31;
    max-height:76%; overflow-y:auto;
  }
  .data-modal.open{ opacity:1; transform:translateY(-50%) scale(1); pointer-events:auto; }
  .data-modal-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .data-modal-head h3{ font-family:'JetBrains Mono',monospace; font-size:22px; margin:0; }
  .data-modal textarea{
    width:100%; height:110px; background:rgba(237,234,224,0.03); border:1px solid var(--dash); border-radius:8px;
    padding:10px; color:var(--cream); font-family:'JetBrains Mono',monospace; font-size:11.5px; outline:none; resize:none; margin-bottom:10px;
  }
  .data-modal textarea:focus{ border-color:var(--blue); }
  .data-modal .row-btns{ display:flex; gap:8px; margin-bottom:20px; }
  .data-modal button.action{ flex:1; background:var(--blue); color:var(--bg); border:none; border-radius:7px; padding:10px; font-weight:700; font-size:13px; cursor:pointer; }
  .data-modal button.secondary{ flex:1; background:transparent; border:1px solid var(--dash); color:var(--cream-dim); border-radius:7px; padding:10px; font-weight:600; font-size:13px; cursor:pointer; }
  .data-modal-note{ font-size:11.5px; color:var(--cream-dim); margin-top:-6px; margin-bottom:14px; }

  @media (max-width: 480px){
    body{ padding:0; align-items:stretch; }
    .phone-frame{ width:100%; height:100vh; height:100dvh; border-radius:0; border:none; box-shadow:none; }
    .screen{ padding-top:34px; }
  }
</style>
</head>
<body>
  <div class="phone-frame">
    <div class="screen">
      <div class="brand">
        <h1>tally<span class="cursor"></span></h1>
        <div class="underline"></div>
      </div>

      <div class="list-controls">
        <input type="search" id="searchInput" placeholder="Search picks…" aria-label="Search predictions">
        <select id="sortSelect" aria-label="Sort predictions">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="az">A–Z</option>
          <option value="status">Status</option>
        </select>
      </div>

      <div class="list-wrap"><div id="list"></div></div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite">
      <span id="toastMsg"></span>
      <button id="toastUndoBtn" style="display:none;">Undo</button>
    </div>

    <div class="bottom-bar">
      <button class="groups-btn" id="menuBtn" aria-label="Open groups menu"><span class="bars" aria-hidden="true">☰</span> Groups</button>
      <button class="fab" id="fabBtn" aria-label="Add prediction">+</button>
    </div>

    <div class="sheet-overlay" id="sheetOverlay"></div>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="New prediction">
      <div class="sheet-handle"></div>
      <div class="sheet-head"><h3>New prediction</h3><button class="sheet-close" id="sheetClose" aria-label="Close">✕</button></div>

      <div class="field-row">
        <div class="field grow">
          <div class="label-caps" style="padding:0;">Market / Title</div>
          <input type="text" id="newText" placeholder="e.g. Total Corners" maxlength="140">
        </div>
        <div class="field group-field">
          <div class="label-caps" style="padding:0;">Group</div>
          <select id="groupSelect"></select>
        </div>
      </div>
      <div class="field">
        <div class="label-caps" style="padding:0;">Type</div>
        <div class="type-toggle">
          <button class="type-btn active" data-type="counter">Counter</button>
          <button class="type-btn" data-type="overunder">Over / Under</button>
          <button class="type-btn" data-type="yesno">Yes / No</button>
        </div>
      </div>
      <div class="field" id="thresholdField">
        <div class="label-caps" style="padding:0;" id="thresholdLabel">Threshold</div>
        <div class="stepper-field">
          <button id="thMinus" type="button" aria-label="Decrease threshold">−</button>
          <span id="thVal">1</span>
          <button id="thPlus" type="button" aria-label="Increase threshold">+</button>
        </div>
      </div>
      <div class="field" id="selectionField" style="display:none;">
        <div class="label-caps" style="padding:0;">Selection</div>
        <input type="text" id="newSelection" placeholder="e.g. Yes / Switzerland or Tie" maxlength="140">
      </div>
      <button class="sheet-submit" id="addBtn">Add prediction</button>
    </div>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Groups menu">
      <div class="drawer-head"><h3>Menu</h3><button class="drawer-close" id="drawerClose" aria-label="Close">✕</button></div>
      <div class="label-caps">View</div>
      <div class="view-rows" id="viewRows"></div>
      <div class="label-caps">Groups</div>
      <div class="group-cards" id="groupCards"></div>
      <div id="groupAddArea"></div>
      <div class="drawer-footer">
        <button class="drawer-footer-btn" id="openDataBtn">⇅ Export / Import data</button>
      </div>
    </div>

    <div class="data-modal-overlay" id="dataModalOverlay"></div>
    <div class="data-modal" id="dataModal" role="dialog" aria-modal="true" aria-label="Export or import data">
      <div class="data-modal-head"><h3>Export</h3><button class="sheet-close" id="dataModalClose" aria-label="Close">✕</button></div>
      <textarea id="exportArea" readonly aria-label="Exported data"></textarea>
      <div class="row-btns"><button class="action" id="exportCopyBtn">Copy to clipboard</button></div>
      <div class="data-modal-head"><h3>Import</h3></div>
      <div class="data-modal-note">Paste previously exported data below. This replaces everything currently in the app.</div>
      <textarea id="importArea" placeholder="Paste JSON here…" aria-label="Data to import"></textarea>
      <div class="row-btns"><button class="secondary" id="importLoadBtn">Load data</button></div>
    </div>
  </div>

<script>
(function(){
  const KEY = 'app-data-v3';
  const OLD_KEYS = ['app-data-v2','app-data'];
  let groups = [];
  let predictions = [];
  let activeFilter = 'all';
  let newType = 'counter';
  let newThreshold = 1;
  let animatingId = null;
  let editingId = null, editingOriginal = '';
  let groupEditingId = null;
  let searchQuery = '';
  let sortMode = 'newest';
  let loaded = false;
  let saving = false, pendingSave = false;
  let toastTimer = null;
  let pendingUndo = null; // {prediction, index}
  let returnFocusEl = null;

  const screenEl = document.querySelector('.screen');
  const menuBtn = document.getElementById('menuBtn');
  const listEl = document.getElementById('list');
  const groupSelect = document.getElementById('groupSelect');
  const newText = document.getElementById('newText');
  const newSelection = document.getElementById('newSelection');
  const addBtn = document.getElementById('addBtn');
  const thVal = document.getElementById('thVal');
  const thMinus = document.getElementById('thMinus');
  const thPlus = document.getElementById('thPlus');
  const thresholdField = document.getElementById('thresholdField');
  const thresholdLabel = document.getElementById('thresholdLabel');
  const selectionField = document.getElementById('selectionField');
  const fabBtn = document.getElementById('fabBtn');
  const sheet = document.getElementById('sheet');
  const sheetOverlay = document.getElementById('sheetOverlay');
  const sheetClose = document.getElementById('sheetClose');
  const drawer = document.getElementById('drawer');
  const drawerOverlay = document.getElementById('drawerOverlay');
  const drawerClose = document.getElementById('drawerClose');
  const viewRows = document.getElementById('viewRows');
  const groupCards = document.getElementById('groupCards');
  const groupAddArea = document.getElementById('groupAddArea');
  const searchInput = document.getElementById('searchInput');
  const sortSelect = document.getElementById('sortSelect');
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  const toastUndoBtn = document.getElementById('toastUndoBtn');
  const openDataBtn = document.getElementById('openDataBtn');
  const dataModal = document.getElementById('dataModal');
  const dataModalOverlay = document.getElementById('dataModalOverlay');
  const dataModalClose = document.getElementById('dataModalClose');
  const exportArea = document.getElementById('exportArea');
  const importArea = document.getElementById('importArea');
  const exportCopyBtn = document.getElementById('exportCopyBtn');
  const importLoadBtn = document.getElementById('importLoadBtn');

  function uid(p){ return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function fmt(n){ return Number.isInteger(n) ? String(n) : n.toFixed(1); }
  function roundHalf(n){ return Math.round(n*2)/2; }

  /* ---------- focus trap helpers ---------- */
  function getFocusable(container){
    return Array.from(container.querySelectorAll('button, [href], input, select, textarea, [tabindex]'))
      .filter(el => !el.disabled && el.tabIndex !== -1 && el.offsetParent !== null);
  }
  function wireOverlay(container, closeFn){
    container.addEventListener('keydown', e=>{
      if(!container.classList.contains('open')) return;
      if(e.key==='Escape'){ closeFn(); return; }
      if(e.key==='Tab'){
        const f = getFocusable(container);
        if(f.length===0) return;
        const first=f[0], last=f[f.length-1];
        if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
        else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
      }
    });
  }

  /* ---------- sheet ---------- */
  function resetSheetForm(){
    newText.value=''; newSelection.value='';
    newThreshold = 1; thVal.textContent = fmt(newThreshold);
    newType = 'counter';
    document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.type-btn[data-type="counter"]').classList.add('active');
    thresholdField.style.display = 'flex';
    selectionField.style.display = 'none';
    thresholdLabel.textContent = 'Threshold';
  }
  function openSheet(){
    returnFocusEl = document.activeElement;
    resetSheetForm();
    if(activeFilter!=='all' && activeFilter!=='ungrouped' && activeFilter!=='active' && activeFilter!=='resolved' && groups.some(g=>g.id===activeFilter)){
      groupSelect.value = activeFilter;
    } else if(activeFilter==='ungrouped'){
      groupSelect.value = '';
    }
    sheet.classList.add('open'); sheetOverlay.classList.add('open');
    setTimeout(()=> newText.focus(), 50);
  }
  function closeSheet(){
    sheet.classList.remove('open'); sheetOverlay.classList.remove('open');
    if(returnFocusEl) returnFocusEl.focus();
  }
  fabBtn.addEventListener('click', openSheet);
  sheetClose.addEventListener('click', closeSheet);
  sheetOverlay.addEventListener('click', closeSheet);
  wireOverlay(sheet, closeSheet);

  /* ---------- drawer ---------- */
  function openDrawer(){
    returnFocusEl = document.activeElement;
    drawer.classList.add('open'); drawerOverlay.classList.add('open');
    setTimeout(()=> drawerClose.focus(), 50);
  }
  function closeDrawer(){
    drawer.classList.remove('open'); drawerOverlay.classList.remove('open');
    if(returnFocusEl) returnFocusEl.focus();
  }
  menuBtn.addEventListener('click', openDrawer);
  drawerClose.addEventListener('click', closeDrawer);
  drawerOverlay.addEventListener('click', closeDrawer);
  wireOverlay(drawer, closeDrawer);

  /* ---------- data modal ---------- */
  function openDataModal(){
    returnFocusEl = document.activeElement;
    exportArea.value = JSON.stringify({groups,predictions}, null, 0);
    importArea.value = '';
    dataModal.classList.add('open'); dataModalOverlay.classList.add('open');
    setTimeout(()=> dataModalClose.focus(), 50);
  }
  function closeDataModal(){
    dataModal.classList.remove('open'); dataModalOverlay.classList.remove('open');
    if(returnFocusEl) returnFocusEl.focus();
  }
  openDataBtn.addEventListener('click', ()=>{ closeDrawer(); openDataModal(); });
  dataModalClose.addEventListener('click', closeDataModal);
  dataModalOverlay.addEventListener('click', closeDataModal);
  wireOverlay(dataModal, closeDataModal);

  exportCopyBtn.addEventListener('click', async ()=>{
    try{
      await navigator.clipboard.writeText(exportArea.value);
      showToast('Copied to clipboard');
    }catch(e){
      exportArea.focus(); exportArea.select();
      showToast('Select-all applied — copy manually');
    }
  });
  importLoadBtn.addEventListener('click', ()=>{
    const raw = importArea.value.trim();
    if(!raw){ showToast("Paste data to import first"); return; }
    try{
      const parsed = JSON.parse(raw);
      if(!parsed || !Array.isArray(parsed.predictions)) throw new Error('bad shape');
      groups = parsed.groups || [];
      predictions = parsed.predictions.map(p => ({ resolution:'pending', direction:'over', selectionLabel:'', resolutionManual:false, ...p }));
      closeDataModal();
      render(); saveData();
      showToast('Data imported');
    }catch(e){
      showToast('Could not read that data — check the JSON');
    }
  });

  /* ---------- toast ---------- */
  function showToast(msg, undoFn){
    clearTimeout(toastTimer);
    toastMsg.textContent = msg;
    toastUndoBtn.style.display = undoFn ? 'inline-block' : 'none';
    toastUndoBtn.onclick = undoFn ? ()=>{ undoFn(); hideToast(); } : null;
    toast.classList.add('show');
    toastTimer = setTimeout(hideToast, 5000);
  }
  function hideToast(){ toast.classList.remove('show'); clearTimeout(toastTimer); }

  /* ---------- persistence ---------- */
  async function loadData(){
    try{
      const raw = localStorage.getItem(KEY);
      if(raw){
        const p = JSON.parse(raw);
        groups = p.groups || []; predictions = p.predictions || [];
      } else throw new Error('none');
    }catch(e){
      let migrated = false;
      for(const ok of OLD_KEYS){
        try{
          const old = localStorage.getItem(ok);
          if(old){
            const p = JSON.parse(old);
            groups = p.groups || [];
            predictions = (p.predictions||[]).map(x => ({
              id:x.id, text:x.text, type:x.type || 'counter', groupId:x.groupId||null,
              threshold: x.threshold!==undefined ? x.threshold : (x.target || 10),
              direction: x.direction || 'over',
              count: x.count || 0,
              outcome: x.outcome || null,
              resolution: x.resolution || 'pending',
              selectionLabel: x.selectionLabel || '',
              createdAt:x.createdAt||Date.now()
            }));
            migrated = true;
            break;
          }
        }catch(e2){}
      }
      if(!migrated){ groups=[]; predictions=[]; }
    }
    predictions = predictions.map(p => ({
      resolution:'pending', direction:'over', selectionLabel:'', resolutionManual:false, createdAt:Date.now(), ...p
    }));
    loaded = true;
    render();
  }

  async function saveData(){
    if(saving){ pendingSave = true; return; }
    saving = true;
    try{
      localStorage.setItem(KEY, JSON.stringify({groups,predictions}));
    }catch(e){ /* silent retry on next change */ }
    finally{ saving=false; if(pendingSave){ pendingSave=false; saveData(); } }
  }

  /* ---------- groups ---------- */
  function addGroup(name){
    const t = name.trim(); if(!t) return;
    groups.push({id:uid('g'), name:t});
    render(); saveData();
  }
  function deleteGroup(id){
    const g = groups.find(x=>x.id===id); if(!g) return;
    const count = predictions.filter(p=>p.groupId===id).length;
    const msg = count>0
      ? `Delete "${g.name}"? ${count} prediction${count===1?'':'s'} will become ungrouped.`
      : `Delete "${g.name}"?`;
    if(!confirm(msg)) return;
    groups = groups.filter(x=>x.id!==id);
    predictions.forEach(p=>{ if(p.groupId===id) p.groupId=null; });
    if(activeFilter===id) activeFilter='all';
    render(); saveData();
  }
  function startRenameGroup(id){ groupEditingId = id; render(); focusGroupEdit(); }
  function commitRenameGroup(id, val){
    const g = groups.find(x=>x.id===id);
    if(g){ const t = val.trim(); if(t) g.name = t; }
    groupEditingId = null;
    render(); saveData();
  }
  function focusGroupEdit(){
    const el = groupCards.querySelector('.gname-edit');
    if(el){ el.focus(); el.select(); }
  }

  /* ---------- predictions ---------- */
  function addPrediction(){
    const t = newText.value.trim(); if(!t) return;
    predictions.unshift({
      id:uid('p'), text:t, type:newType,
      groupId: groupSelect.value || null,
      threshold: newType==='yesno' ? null : Math.max(1,newThreshold),
      count: 0,
      outcome: newType==='yesno' ? 'pending' : null,
      resolution: 'pending',
      resolutionManual: false,
      selectionLabel: newType==='yesno' ? newSelection.value.trim() : '',
      createdAt: Date.now()
    });
    closeSheet();
    render(); saveData();
  }
  function removePrediction(id){
    const idx = predictions.findIndex(p=>p.id===id); if(idx===-1) return;
    const [removed] = predictions.splice(idx,1);
    render(); saveData();
    showToast('Prediction deleted', ()=>{
      predictions.splice(idx,0,removed);
      render(); saveData();
    });
  }
  function autoResolve(p){
    if(p.resolutionManual) return;
    if(p.type==='counter' || p.type==='overunder'){
      p.resolution = p.count >= p.threshold ? 'won' : 'pending';
    }
  }
  function inc(id){ const p=predictions.find(x=>x.id===id); if(!p) return; p.count+=1; animatingId=id; autoResolve(p); render(); saveData(); }
  function dec(id){ const p=predictions.find(x=>x.id===id); if(!p) return; p.count=Math.max(0,p.count-1); autoResolve(p); render(); saveData(); }
  function setThreshold(id,val){ const p=predictions.find(x=>x.id===id); if(!p) return; p.threshold=Math.max(1, roundHalf(parseFloat(val)||1)); autoResolve(p); render(); saveData(); }
  function setOutcome(id,val){ const p=predictions.find(x=>x.id===id); if(!p) return; p.outcome = (p.outcome===val)?'pending':val; render(); saveData(); }
  function setResolution(id,val){
    const p=predictions.find(x=>x.id===id); if(!p) return;
    if(p.resolution===val){ p.resolution='pending'; p.resolutionManual=false; autoResolve(p); }
    else { p.resolution=val; p.resolutionManual=true; }
    render(); saveData();
  }
  function moveGroup(id,groupId){ const p=predictions.find(x=>x.id===id); if(!p) return; p.groupId = groupId || null; render(); saveData(); }
  function startEditText(id){ const p=predictions.find(x=>x.id===id); if(!p) return; editingId=id; editingOriginal=p.text; render(); focusEditInput(); }
  function commitEditText(id, val){
    const p=predictions.find(x=>x.id===id);
    if(p){ const t=val.trim(); if(t) p.text=t; }
    editingId=null;
    render(); saveData();
  }
  function focusEditInput(){
    const el = listEl.querySelector('.card-text-edit');
    if(el){ el.focus(); el.select(); }
  }

  function resolutionOf(p){
    if(p.type==='yesno') return p.outcome==='yes'?'won':(p.outcome==='no'?'lost':'pending');
    return p.resolution || 'pending';
  }

  function counterStatus(count,target){ if(count<=0) return 'red'; const r=count/target; if(r<1/3) return 'red'; if(r<2/3) return 'yellow'; return 'green'; }
  function ynStatus(outcome){ if(outcome==='yes') return 'green'; if(outcome==='no') return 'red'; return 'yellow'; }

  function tallySVG(count, animateLast, statusClass){
    if(count===0) return '';
    const capped = Math.min(count, 30);
    let html = '';
    for(let i=0;i<capped;i++){
      const isNew = animateLast && i===capped-1;
      html += `<span class="seg filled ${statusClass}${isNew?' new':''}"></span>`;
    }
    if(count>30) html += `<span style="color:var(--cream-dim);font-size:11.5px;margin-left:4px;">+${count-30}</span>`;
    return html;
  }

  function dotWheelSVG(total, met, size){
    size = size || 40;
    const cx=size/2, cy=size/2, r=size/2-5, dotR=Math.max(2.2, Math.min(3.6, 14/Math.max(total,1)));
    let dots = '';
    if(total===0){
      dots = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--dash-faint)" stroke-width="2" stroke-dasharray="3,4"/>`;
    } else {
      for(let i=0;i<total;i++){
        const angle = (i/total)*2*Math.PI - Math.PI/2;
        const x = cx + r*Math.cos(angle);
        const y = cy + r*Math.sin(angle);
        const isMet = i < met;
        dots += `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${dotR}" fill="${isMet?'var(--green)':'none'}" stroke="${isMet?'var(--green)':'var(--dash)'}" stroke-width="1.4"/>`;
      }
    }
    const centerText = total>0 ? `<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="${size*0.26}" font-family="'JetBrains Mono',monospace" font-weight="700" fill="var(--cream-dim)">${met}/${total}</text>` : '';
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="${met} of ${total} won">${dots}${centerText}</svg>`;
  }

  function groupName(id){ const g=groups.find(x=>x.id===id); return g?g.name:null; }

  function statsFor(list){
    let pending=0,won=0,lost=0;
    list.forEach(p=>{ const r=resolutionOf(p); if(r==='won')won++; else if(r==='lost')lost++; else pending++; });
    return {pending,won,lost,total:list.length};
  }

  function filteredList(){
    if(activeFilter==='all') return predictions;
    if(activeFilter==='ungrouped') return predictions.filter(p=>!p.groupId);
    if(activeFilter==='active') return predictions.filter(p=>resolutionOf(p)==='pending');
    if(activeFilter==='resolved') return predictions.filter(p=>resolutionOf(p)!=='pending');
    return predictions.filter(p=>p.groupId===activeFilter);
  }

  function applySearchSort(list){
    let out = list;
    if(searchQuery){
      const q = searchQuery.toLowerCase();
      out = out.filter(p=>p.text.toLowerCase().includes(q));
    }
    out = out.slice();
    const statusRank = p => { const r=resolutionOf(p); return r==='pending'?0:(r==='won'?1:2); };
    if(sortMode==='newest') out.sort((a,b)=>b.createdAt-a.createdAt);
    else if(sortMode==='oldest') out.sort((a,b)=>a.createdAt-b.createdAt);
    else if(sortMode==='az') out.sort((a,b)=>a.text.localeCompare(b.text));
    else if(sortMode==='status') out.sort((a,b)=>statusRank(a)-statusRank(b) || b.createdAt-a.createdAt);
    return out;
  }

  function renderViewRows(){
    viewRows.innerHTML = `
      <div class="view-row ${activeFilter==='all'?'active':''}" data-filter="all"><span class="name">All</span><span class="n">${predictions.length}</span></div>
      <div class="view-row ${activeFilter==='active'?'active':''}" data-filter="active"><span class="name">Active</span><span class="n">${predictions.filter(p=>resolutionOf(p)==='pending').length}</span></div>
      <div class="view-row ${activeFilter==='resolved'?'active':''}" data-filter="resolved"><span class="name">Resolved</span><span class="n">${predictions.filter(p=>resolutionOf(p)!=='pending').length}</span></div>
      <div class="view-row ${activeFilter==='ungrouped'?'active':''}" data-filter="ungrouped"><span class="name">Ungrouped</span><span class="n">${predictions.filter(p=>!p.groupId).length}</span></div>
    `;
  }

  function renderGroupCards(){
    groupCards.innerHTML = groups.map(g=>{
      const items = predictions.filter(p=>p.groupId===g.id);
      const st = statsFor(items);
      const resolvedCount = st.won+st.lost;
      const winRate = resolvedCount>0 ? Math.round((st.won/resolvedCount)*100)+'% win rate' : 'No picks resolved yet';
      const isEditing = groupEditingId===g.id;
      return `<div class="group-card ${activeFilter===g.id?'active':''}" data-filter="${isEditing?'':g.id}">
        ${dotWheelSVG(st.total, st.won, 40)}
        <div class="ginfo">
          <div class="gname-row">
            ${isEditing
              ? `<input class="gname-edit" data-action="grouprename-input" data-id="${g.id}" value="${esc(g.name)}" maxlength="40">`
              : `<span class="gname">${esc(g.name)}</span><button class="gedit-btn" data-action="grouprename" data-id="${g.id}" aria-label="Rename group" title="Rename">✎</button>`}
          </div>
          <div class="gpicks">${st.total} pick${st.total===1?'':'s'}</div>
          <div class="gwinrate">${winRate}</div>
        </div>
        <span class="gdel" data-delgroup="${g.id}" role="button" tabindex="0" aria-label="Delete group ${esc(g.name)}">✕</span>
      </div>`;
    }).join('');
    groupAddArea.innerHTML = `<button class="new-group-btn" id="newGroupToggle">+ New group</button>`;
  }

  function renderGroupSelect(){
    const cur = groupSelect.value;
    groupSelect.innerHTML = '<option value="">Ungrouped</option>' + groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('');
    if([...groupSelect.options].some(o=>o.value===cur)) groupSelect.value=cur;
  }

  function groupSelectHTML(p){
    const opts = `<option value="" ${!p.groupId?'selected':''}>Ungrouped</option>` +
      groups.map(g=>`<option value="${g.id}" ${p.groupId===g.id?'selected':''}>${esc(g.name)}</option>`).join('');
    return `<select data-action="movegroup" data-id="${p.id}" aria-label="Move to group">${opts}</select>`;
  }

  function statusLabel(cls){ return cls==='green' ? 'On track' : (cls==='yellow' ? 'Getting close' : 'Behind'); }

  function cardHTML(p){
    const res = resolutionOf(p);
    let dotClass, subHTML='', bottomHTML;
    const isEditingText = editingId===p.id;
    const titleHTML = isEditingText
      ? `<input class="card-text-edit" type="text" data-action="edittext-input" data-id="${p.id}" value="${esc(p.text)}" maxlength="140">`
      : `<span class="card-text" data-action="edittext" data-id="${p.id}" tabindex="0" role="button" aria-label="Edit prediction: ${esc(p.text)}">${esc(p.text)}</span>`;

    if(p.type==='counter' || p.type==='overunder'){
      dotClass = counterStatus(p.count, p.threshold);
      bottomHTML = `
        <div class="res-btns">
          <button class="res-btn won ${res==='won'?'active':''}" data-action="won" data-id="${p.id}" aria-label="Mark as won">✓</button>
          <button class="res-btn lost ${res==='lost'?'active':''}" data-action="lost" data-id="${p.id}" aria-label="Mark as lost">✕</button>
        </div>
        <div class="right-controls">
          <div class="tally-area">${tallySVG(p.count, p.id===animatingId, dotClass)}</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="count-num">${p.count}</span>
            <span class="of-target">/ <input class="target-edit" type="number" min="1" max="999" step="0.5" value="${fmt(p.threshold)}" data-action="threshold" data-id="${p.id}" aria-label="Threshold"></span>
          </div>
          <div class="stepper">
            <button data-action="dec" data-id="${p.id}" ${p.count===0?'disabled':''} aria-label="Decrease count">−</button>
            <button data-action="inc" data-id="${p.id}" aria-label="Increase count">+</button>
          </div>
        </div>`;
    } else {
      dotClass = ynStatus(p.outcome);
      if(p.selectionLabel) subHTML = `<div class="card-sub">${esc(p.selectionLabel)}</div>`;
      bottomHTML = `
        <div class="yn-btns">
          <button class="yn-btn yes ${p.outcome==='yes'?'active':''}" data-action="yes" data-id="${p.id}">Yes</button>
          <button class="yn-btn no ${p.outcome==='no'?'active':''}" data-action="no" data-id="${p.id}">No</button>
        </div>
        <span></span>`;
    }

    return `<div class="card">
      <div class="card-top">
        <span class="dot ${dotClass}" role="img" aria-label="Status: ${statusLabel(dotClass)}" title="${statusLabel(dotClass)}"></span>
        ${titleHTML}
        <button class="del-btn" data-action="delete" data-id="${p.id}" aria-label="Delete prediction">✕</button>
      </div>
      ${subHTML}
      <div class="card-group-row">${groupSelectHTML(p)}</div>
      <div class="card-controls-row">${bottomHTML}</div>
    </div>`;
  }

  function render(){
    renderViewRows();
    renderGroupCards();
    renderGroupSelect();
    if(groupEditingId) focusGroupEdit();

    if(!loaded){ listEl.innerHTML = '<div class="empty">Loading…</div>'; return; }

    const scrollBefore = screenEl ? screenEl.scrollTop : 0;

    const list = filteredList();

    if(predictions.length===0){ listEl.innerHTML = '<div class="empty">No predictions yet.<br>Tap + to start tallying.</div>'; animatingId=null; return; }
    if(list.length===0){ listEl.innerHTML = '<div class="empty">Nothing here yet.</div>'; animatingId=null; return; }

    if(activeFilter==='all' && groups.length>0){
      let html='';
      groups.forEach(g=>{
        const items = applySearchSort(predictions.filter(p=>p.groupId===g.id));
        if(items.length===0) return;
        html += `<div class="section-header">${esc(g.name)}<span class="line"></span></div>` + items.map(cardHTML).join('');
      });
      const ungrouped = applySearchSort(predictions.filter(p=>!p.groupId));
      if(ungrouped.length>0) html += `<div class="section-header">Ungrouped<span class="line"></span></div>` + ungrouped.map(cardHTML).join('');
      listEl.innerHTML = html || '<div class="empty">No matches.</div>';
    } else {
      const sorted = applySearchSort(list);
      listEl.innerHTML = sorted.length ? sorted.map(cardHTML).join('') : '<div class="empty">No matches.</div>';
    }
    animatingId = null;
    if(isEditingTextFocus()) focusEditInput();
    if(screenEl) screenEl.scrollTop = scrollBefore;
  }
  function isEditingTextFocus(){ return editingId!==null; }

  /* ---------- events: drawer / view / groups ---------- */
  viewRows.addEventListener('click', e=>{
    const row = e.target.closest('[data-filter]'); if(!row) return;
    activeFilter = row.dataset.filter; render(); closeDrawer();
    if(screenEl) screenEl.scrollTop = 0;
  });
  groupCards.addEventListener('click', e=>{
    const del = e.target.closest('[data-delgroup]');
    if(del){ e.stopPropagation(); deleteGroup(del.dataset.delgroup); return; }
    const rename = e.target.closest('[data-action="grouprename"]');
    if(rename){ e.stopPropagation(); startRenameGroup(rename.dataset.id); return; }
    if(e.target.closest('.gname-edit')) return;
    const card = e.target.closest('[data-filter]'); if(!card || !card.dataset.filter) return;
    activeFilter = card.dataset.filter; render(); closeDrawer();
    if(screenEl) screenEl.scrollTop = 0;
  });
  groupCards.addEventListener('keydown', e=>{
    const del = e.target.closest('[data-delgroup]');
    if(del && (e.key==='Enter' || e.key===' ')){ e.preventDefault(); deleteGroup(del.dataset.delgroup); return; }
    const input = e.target.closest('.gname-edit');
    if(input){
      if(e.key==='Enter'){ e.target.blur(); }
      else if(e.key==='Escape'){ groupEditingId=null; render(); }
    }
  });
  groupCards.addEventListener('focusout', e=>{
    const input = e.target.closest('.gname-edit');
    if(input) commitRenameGroup(input.dataset.id, input.value);
  });

  groupAddArea.addEventListener('click', e=>{
    if(e.target.id==='newGroupToggle'){
      groupAddArea.innerHTML = `<div class="group-add-inline"><input type="text" id="newGroupInput" placeholder="Group name" maxlength="40"><button id="newGroupSubmit">Add</button></div>`;
      document.getElementById('newGroupInput').focus();
    } else if(e.target.id==='newGroupSubmit'){
      addGroup(document.getElementById('newGroupInput').value);
    }
  });
  groupAddArea.addEventListener('keydown', e=>{ if(e.target.id==='newGroupInput' && e.key==='Enter') addGroup(e.target.value); });

  /* ---------- events: add-prediction sheet ---------- */
  document.querySelectorAll('.type-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      newType = btn.dataset.type;
      thresholdField.style.display = newType==='yesno' ? 'none' : 'flex';
      selectionField.style.display = newType==='yesno' ? 'flex' : 'none';
      thresholdLabel.textContent = newType==='overunder' ? 'Line' : 'Threshold';
    });
  });
  thMinus.addEventListener('click', ()=>{ newThreshold = Math.max(1, roundHalf(newThreshold-0.5)); thVal.textContent=fmt(newThreshold); });
  thPlus.addEventListener('click', ()=>{ newThreshold = roundHalf(newThreshold+0.5); thVal.textContent=fmt(newThreshold); });

  addBtn.addEventListener('click', addPrediction);
  newText.addEventListener('keydown', e=>{ if(e.key==='Enter') addPrediction(); });

  /* ---------- events: search / sort ---------- */
  searchInput.addEventListener('input', e=>{ searchQuery = e.target.value; render(); });
  sortSelect.addEventListener('change', e=>{ sortMode = e.target.value; render(); });

  /* ---------- events: list (cards) ---------- */
  listEl.addEventListener('click', e=>{
    const editTrigger = e.target.closest('[data-action="edittext"]');
    if(editTrigger){ startEditText(editTrigger.dataset.id); return; }
    const btn = e.target.closest('button[data-action]'); if(!btn) return;
    const id = btn.dataset.id, action = btn.dataset.action;
    if(action==='inc') inc(id);
    else if(action==='dec') dec(id);
    else if(action==='delete') removePrediction(id);
    else if(action==='yes') setOutcome(id,'yes');
    else if(action==='no') setOutcome(id,'no');
    else if(action==='won') setResolution(id,'won');
    else if(action==='lost') setResolution(id,'lost');
  });
  listEl.addEventListener('keydown', e=>{
    const editTrigger = e.target.closest('[data-action="edittext"]');
    if(editTrigger && (e.key==='Enter' || e.key===' ')){ e.preventDefault(); startEditText(editTrigger.dataset.id); return; }
    const editInput = e.target.closest('.card-text-edit');
    if(editInput){
      if(e.key==='Enter'){ e.preventDefault(); e.target.blur(); }
      else if(e.key==='Escape'){ e.target.value = editingOriginal; e.target.blur(); }
    }
  });
  listEl.addEventListener('focusout', e=>{
    const editInput = e.target.closest('.card-text-edit');
    if(editInput) commitEditText(editInput.dataset.id, editInput.value);
  });
  listEl.addEventListener('change', e=>{
    const th = e.target.closest('[data-action="threshold"]');
    if(th){ setThreshold(th.dataset.id, th.value); return; }
    const mv = e.target.closest('[data-action="movegroup"]');
    if(mv){ moveGroup(mv.dataset.id, mv.value); return; }
  });

  loadData();
})();
</script>
</body>
</html>
